<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#CC0000"/>
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="10" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Vertical ellipse -->
  <ellipse cx="16" cy="16" rx="5.5" ry="10" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Horizontal lines -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="white" stroke-width="1.2"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="white" stroke-width="1.2"/>
  <!-- Vertical center line -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="white" stroke-width="1.2"/>
</svg>
